# Τοπικό dev περιβάλλον
# Εκκίνηση: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up
services:
  flask:
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://solon:devpassword@postgres:5432/solon
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    command: flask run --host=0.0.0.0 --port=5000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"

  celery:
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://solon:devpassword@postgres:5432/solon
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: development

  celery-beat:
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql://solon:devpassword@postgres:5432/solon
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: development

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src

  nginx:
    profiles: ["disabled"]
