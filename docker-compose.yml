services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: solon
      POSTGRES_USER: solon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "solon"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  flask:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://solon:${POSTGRES_PASSWORD}@postgres:5432/solon
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade && gunicorn --bind 0.0.0.0:5000 --workers 4 'app:create_app()'"

  celery:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://solon:${POSTGRES_PASSWORD}@postgres:5432/solon
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: production
    depends_on:
      - flask
    command: celery -A celery_app worker --loglevel=info --concurrency=3 -Q default,short

  celery-beat:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://solon:${POSTGRES_PASSWORD}@postgres:5432/solon
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: production
    depends_on:
      - celery
    command: celery -A celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    depends_on:
      - flask

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - flask

volumes:
  pgdata:
